# Configuracao do servidor web (nginx nao-privilegiado, porta 8080).
# Serve a aplicacao estatica e faz proxy de /api -> API Gateway.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cabecalhos de seguranca (mitigacao de XSS/clickjacking - RNF09)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Todo acesso as APIs internas passa pelo API Gateway.
    location /api/ {
        proxy_pass http://api-gateway:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
