# Banco de dados de agendamentos (PostgreSQL) - StatefulSet com volume persistente.
apiVersion: v1
kind: Service
metadata:
  name: appointments-db
  namespace: hora-marcada
  labels:
    app: appointments-db
spec:
  selector:
    app: appointments-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: appointments-db
  namespace: hora-marcada
spec:
  serviceName: appointments-db
  replicas: 1
  selector:
    matchLabels:
      app: appointments-db
  template:
    metadata:
      labels:
        app: appointments-db
        app.kubernetes.io/part-of: hora-marcada
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: hora-marcada-config
                  key: POSTGRES_SCHED_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: hora-marcada-config
                  key: POSTGRES_SCHED_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hora-marcada-secrets
                  key: POSTGRES_SCHED_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
