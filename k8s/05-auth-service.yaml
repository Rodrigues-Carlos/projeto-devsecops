# Servico de Autenticacao - Deployment (2 replicas para alta disponibilidade) + Service.
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: hora-marcada
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: hora-marcada
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/part-of: hora-marcada
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-service
          image: hora-marcada/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hora-marcada-secrets
                  key: AUTH_DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hora-marcada-secrets
                  key: JWT_SECRET
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hora-marcada-secrets
                  key: ADMIN_PASSWORD
            - name: ADMIN_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: hora-marcada-config
                  key: ADMIN_EMAIL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: hora-marcada-config
                  key: LOG_LEVEL
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 80Mi
            limits:
              cpu: 300m
              memory: 192Mi
      volumes:
        - name: tmp
          emptyDir: {}
